<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    overflow-y: auto;
  }

  .container {
    margin: 40px auto;
    width: 90%;
    max-width: 500px;
    position: relative;
  }

  textarea {
    width: 100%;
    height: 33px;
    box-sizing: border-box;
    font-size: 16px;
    padding: 8px;
    resize: none;
  }

  .suggest-box {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: #fff;
    border: 1px solid #ccc;
    border-top: none;
    max-height: 200px;
    overflow-y: auto;
    display: none;
    z-index: 10;
  }

  .suggest-item {
    padding: 6px 8px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .suggest-item:hover {
    background: #e6f2ff;
  }

  .suggest-item img {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 4px;
  }
</style>

</head>
<body>

<div class="container">
  <textarea id="mainText" placeholder="入力…"></textarea>
  <div id="suggestBox" class="suggest-box"></div>
</div>

<script>
// ▼ 最強ローマ字 → ひらがな変換
function romajiToHiragana(str) {
  const table = {
    kya:"きゃ", kyu:"きゅ", kyo:"きょ",
    sha:"しゃ", shu:"しゅ", sho:"しょ",
    cha:"ちゃ", chu:"ちゅ", cho:"ちょ",
    nya:"にゃ", nyu:"にゅ", nyo:"にょ",
    hya:"ひゃ", hyu:"ひゅ", hyo:"ひょ",
    mya:"みゃ", myu:"みゅ", myo:"みょ",
    rya:"りゃ", ryu:"りゅ", ryo:"りょ",
    gya:"ぎゃ", gyu:"ぎゅ", gyo:"ぎょ",
    ja:"じゃ", ju:"じゅ", jo:"じょ",
    bya:"びゃ", byu:"びゅ", byo:"びょ",
    pya:"ぴゃ", pyu:"ぴゅ", pyo:"ぴょ",

    // 促音
    kka:"っか", kki:"っき", kku:"っく", kke:"っけ", kko:"っこ",
    ssa:"っさ", ssi:"っし", ssu:"っす", sse:"っせ", sso:"っそ",
    tta:"った", tti:"っち", ttu:"っつ", tte:"って", tto:"っと",

    // 五十音
    ka:"か", ki:"き", ku:"く", ke:"け", ko:"こ",
    sa:"さ", si:"し", su:"す", se:"せ", so:"そ",
    ta:"た", ti:"ち", tu:"つ", te:"て", to:"と",
    na:"な", ni:"に", nu:"ぬ", ne:"ね", no:"の",
    ha:"は", hi:"ひ", hu:"ふ", he:"へ", ho:"ほ",
    ma:"ま", mi:"み", mu:"む", me:"め", mo:"も",
    ya:"や", yu:"ゆ", yo:"よ",
    ra:"ら", ri:"り", ru:"る", re:"れ", ro:"ろ",
    wa:"わ", wo:"を", nn:"ん",
    a:"あ", i:"い", u:"う", e:"え", o:"お"
  };

  let result = str.toLowerCase();
  const keys = Object.keys(table).sort((a, b) => b.length - a.length);
  keys.forEach(key => {
    result = result.replace(new RegExp(key, "g"), table[key]);
  });
  return result;
}

// ▼ normalize（全部ひらがなに統一）
function normalize(str) {
  // 半角カナ → 全角
  str = str.replace(/[\uFF65-\uFF9F]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0xFEC0)
  );

  // カタカナ → ひらがな
  str = str.replace(/[\u30A1-\u30F6]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0x60)
  );

  // ローマ字 → ひらがな
  str = romajiToHiragana(str);

  return str;
}

// ▼ 辞書（全部 keys に統一）
const DICT = [
  {
    keys: ["炎炎ノ消防隊", "えんえんのしょうぼうたい", "ennennnosyouboutai", "ennennnoshouboutai"],
    label: "炎炎ノ消防隊",
    img: "https://raw.githubusercontent.com/rrrn2525/enen1/main/enen.png",
    url: "https://google.com"
  },
  {
    keys: ["炎炎ノ消防隊2", "えんえんのしょうぼうたい2", "ennennnosyouboutai2", "ennennnoshouboutai2"],
    label: "炎炎ノ消防隊2",
    img: "https://raw.githubusercontent.com/rrrn2525/enen1/main/enen.png",
    url: "https://google.com"
  },
  {
    keys: ["きゃんぷ", "camp", "kyanpu"],
    label: "キャンプ場検索",
    img: "https://raw.githubusercontent.com/rrrn2525/enen1/main/enen.png",
    url: "https://www.google.com/search?q=キャンプ場"
  }
];

const textarea = document.getElementById("mainText");
const suggestBox = document.getElementById("suggestBox");

// ▼ 複数 key 対応の検索
function showSuggestions(token) {
  const list = DICT.filter(item =>
    item.keys.some(k => normalize(k).startsWith(token))
  );

  if (list.length === 0) {
    suggestBox.style.display = "none";
    suggestBox.innerHTML = "";
    return;
  }

  suggestBox.innerHTML = "";

  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "suggest-item";

    const img = document.createElement("img");
    img.src = item.img;

    const span = document.createElement("span");
    span.textContent = item.label;

    div.appendChild(img);
    div.appendChild(span);

    // ★ 候補を押したらリンクに飛ぶ
    div.addEventListener("click", () => {
      window.location.href = item.url;
    });

    suggestBox.appendChild(div);
  });

  suggestBox.style.display = "block";
}

// ▼ 入力イベント
textarea.addEventListener("input", () => {
  const raw = textarea.value.trim();
  if (raw === "") {
    suggestBox.style.display = "none";
    return;
  }

  const token = normalize(raw);
  showSuggestions(token);
});
</script>

</body>
</html>
